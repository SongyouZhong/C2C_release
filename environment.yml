name: c2c
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - numpy
  - pandas
  - biopython
  - pip
  - pip:
    - torch --index-url https://download.pytorch.org/whl/nightly/cu128
    - torchvision --index-url https://download.pytorch.org/whl/nightly/cu128
    - torchaudio --index-url https://download.pytorch.org/whl/nightly/cu128
    - transformers
